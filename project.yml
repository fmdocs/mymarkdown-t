name: MyMarkdownT
# SwiftPM 包依赖，XcodeGen 会把它们写入 .xcodeproj 的 Swift Package 管理器中。
packages:
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
options:
  # 让生成后的工程目录结构尽量贴近仓库实际结构，便于维护。
  createIntermediateGroups: true
  # 固定最低 XcodeGen 版本，避免不同版本生成结果不一致。
  minimumXcodeGenVersion: 2.42.0
configs:
  Debug: debug
  Release: release
configFiles:
  # 将构建配置拆到 xcconfig，避免把环境相关值写死在工程里。
  Debug: Xcode/Config/Debug.xcconfig
  Release: Xcode/Config/Release.xcconfig
settings:
  base:
    # 与当前 SwiftPM 工具链保持一致。
    SWIFT_VERSION: 6.0
    # 当前应用与包都以 macOS 15 为最低部署版本。
    MACOSX_DEPLOYMENT_TARGET: 15.0
    # 默认使用自动签名，便于在 Xcode 中直接切换团队与证书。
    CODE_SIGN_STYLE: Automatic
    # 使用仓库内的 Info.plist，而不是让 Xcode 自动生成。
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Xcode/Support/Info.plist
targets:
  MyMarkdownT:
    # 生成真正可归档、可签名的 macOS App target（产物类型 com.apple.product-type.application）。
    # 注意：不要用 Package.swift 打开 Xcode，要用生成的 MyMarkdownT.xcodeproj。
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/MyMarkdownT
      - path: Resources
    dependencies:
      # 引用上面声明的 SwiftPM 包，让 Xcode 工程能正确链接 MarkdownUI。
      - package: swift-markdown-ui
        product: MarkdownUI
      # Quick Look 预览扩展，嵌入 .app/Contents/PlugIns/ 中。
      # 需要配置 DEVELOPMENT_TEAM 后才能启用（ValidateEmbeddedBinary 要求签名）。
      # - target: QLExtension
      #   embed: true
      #   codeSign: true
    settings:
      base:
        PRODUCT_NAME: MyMarkdownT
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  QLExtension:
    # Quick Look Preview Extension：在 Finder 按空格键时渲染 Markdown 文件。
    type: app-extension
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/QLExtension
    entitlements:
      path: Xcode/Support/QLExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_NAME: QLExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MyMarkdownT.QLExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Xcode/Support/QLExtension-Info.plist
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
  MyMarkdownTTests:
    # 测试目标保持独立，方便在 Xcode 和 SwiftPM 中共用测试代码。
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/MyMarkdownTTests
    dependencies:
      - target: MyMarkdownT
schemes:
  MyMarkdownT:
    build:
      targets:
        MyMarkdownT: all
        MyMarkdownTTests:
          - test
    run:
      # 本地运行默认走 Debug 配置。
      config: Debug
    test:
      config: Debug
      targets:
        - name: MyMarkdownTTests
    archive:
      # 归档固定走 Release，避免误用 Debug 产物做分发。
      config: Release
